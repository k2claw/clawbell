services:
  - type: web
    name: clawbell-v0
    runtime: node
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: node server.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: REQUIRE_ADMIN_AUTH
        value: "1"
      - key: ENABLE_SOREN_BRIDGE
        value: "0"
      - key: ADMIN_TOKEN
        sync: false
      - key: MAX_MESSAGE_CHARS
        value: "1200"
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "12"
