<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Chat with Soren</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <button id="widgetLauncher" class="widget-launcher" type="button" aria-controls="chatRoot" aria-expanded="false">
    <span class="launcher-avatar" aria-hidden="true">🪶</span>
    <span>Talk to Soren</span>
  </button>
  <main id="chatRoot" class="chat" aria-label="Chat with Soren">
    <header class="topbar">
      <div class="identity">
        <div class="avatar" aria-hidden="true">🪶</div>
        <div>
          <strong id="agentName">Soren</strong>
          <span id="agentSubtitle">Ken’s public OpenClaw</span>
        </div>
      </div>
      <span class="badge">public-safe</span>
    </header>

    <section id="messages" class="messages" aria-live="polite">
      <div class="spacer" aria-hidden="true"></div>
      <article class="bubble bot">
        <strong id="welcomeTitle">Hey, I’m Soren.</strong>
        <p id="welcomeMessage">Ken is building agent-native tools like Lettuce. I can answer public questions, pass him useful context, or help you request time.</p>
        <div class="quick" id="starterPrompts"></div>
      </article>
    </section>

    <form id="handoff" class="handoff" hidden>
      <label>Email<input id="email" type="email" autocomplete="email" inputmode="email" placeholder="you@example.com" /></label>
      <label>Note for Ken<textarea id="note" rows="3" placeholder="A sentence or two with useful context."></textarea></label>
      <button type="submit">Send handoff</button>
    </form>

    <form id="composer" class="composer" autocomplete="off">
      <label class="sr-only" for="prompt">Message Soren</label>
      <textarea id="prompt" rows="1" placeholder="Message Soren…" required></textarea>
      <button id="send" type="submit">Send</button>
    </form>
  </main>
  <script src="./app.js"></script>
</body>
</html>
